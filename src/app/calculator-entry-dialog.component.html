@if (modal) {
  <div class="dialog-overlay" (click)="close.emit()"></div>
  <div
    class="dialog-content"
    role="dialog"
    aria-modal="true"
    aria-labelledby="calc-dialog-title"
    (click)="$event.stopPropagation()"
  >
    <div class="dialog-header">
      <h2 class="dialog-title" id="calc-dialog-title">
        {{ form.type === 'Entrada' ? 'Nueva entrada' : 'Nueva salida' }}
      </h2>
      <button class="dialog-close" type="button" (click)="close.emit()" aria-label="Cerrar">
        <svg lucideX size="18"></svg>
      </button>
    </div>

    <div class="dialog-body">
      <div class="dialog-row">
        <label class="field">
          <span>Fecha</span>
          <app-date-picker [value]="form.date" (valueChange)="form.date = $event" />
        </label>
        <label class="field">
          <span>Importe (€)</span>
          <input type="number" min="0" step="0.01" [(ngModel)]="form.amount" />
        </label>
      </div>

      <label class="field">
        <span>Descripción <small>(opcional)</small></span>
        <input type="text" placeholder="Observaciones..." [(ngModel)]="form.description" autocomplete="off" />
      </label>

      @if (validationError) {
        <p class="dialog-error" role="alert">
          <svg lucideAlertCircle size="15"></svg>
          {{ validationError }}
        </p>
      }
    </div>

    <div class="dialog-footer">
      <button class="btn btn-secondary" type="button" (click)="close.emit()">Cancelar</button>
      <button class="btn btn-primary" type="button" (click)="submit()">Guardar</button>
    </div>
  </div>
}
