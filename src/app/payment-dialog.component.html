@if (modal) {
  <div class="dialog-overlay" (click)="close.emit()"></div>
  <div
    class="dialog-content"
    role="dialog"
    aria-modal="true"
    aria-labelledby="dialog-title"
    (click)="$event.stopPropagation()"
  >
    <div class="dialog-header">
      <h2 class="dialog-title" id="dialog-title">
        {{ form.mode === 'create' ? 'Nuevo pago' : 'Editar pago' }}
      </h2>
      <button class="dialog-close" type="button" (click)="close.emit()" aria-label="Cerrar" [disabled]="saving">
        <svg lucideX size="18"></svg>
      </button>
    </div>

    <div class="dialog-body">
      <label class="field">
        <span>Nombre de la clienta</span>
        <input
          type="text"
          placeholder="Nombre"
          [(ngModel)]="form.clientName"
          [disabled]="saving"
          autocomplete="off"
        />
      </label>

      <div class="dialog-row">
        <label class="field">
          <span>Fecha</span>
          <app-date-picker
            [value]="form.date"
            (valueChange)="form.date = $event"
            [disabled]="saving"
          />
        </label>
        <label class="field">
          <span>Importe (€)</span>
          <input
            type="number"
            min="0"
            step="0.01"
            [(ngModel)]="form.value"
            [disabled]="saving"
          />
        </label>
      </div>

      <label class="field">
        <span>Forma de pago</span>
        <app-pay-select
          [options]="paymentMethods"
          [value]="form.paymentMethod"
          (valueChange)="onPaymentMethodChange($any($event))"
        />
      </label>

      @if (showChangeSection()) {
        <div class="change-section" [class.emphasized]="form.paymentMethod === 'Bizum'">
          <span class="change-section-title">¿Fue necesario dar cambio?</span>
          <div class="change-toggle">
            <button
              type="button"
              [class.active]="!form.changeGiven"
              (click)="setChangeGiven(false)"
              [disabled]="saving"
            >
              No
            </button>
            <button
              type="button"
              [class.active]="form.changeGiven"
              (click)="setChangeGiven(true)"
              [disabled]="saving"
            >
              Sí
            </button>
          </div>

          @if (form.changeGiven) {
            <span class="change-section-title">¿Cómo se dio el cambio?</span>
            <div class="change-toggle">
              <button
                type="button"
                [class.active]="form.changeMethod === 'Efectivo'"
                (click)="setChangeMethod('Efectivo')"
                [disabled]="saving"
              >
                Efectivo
              </button>
              <button
                type="button"
                [class.active]="form.changeMethod === 'Bizum'"
                (click)="setChangeMethod('Bizum')"
                [disabled]="saving"
              >
                Bizum
              </button>
            </div>

            <label class="field">
              <span>Importe del cambio (€)</span>
              <input
                type="number"
                min="0"
                step="0.01"
                [(ngModel)]="form.changeAmount"
                [disabled]="saving"
              />
            </label>
          }
        </div>
      }

      <label class="field">
        <span>Notas <small>(opcional)</small></span>
        <textarea
          rows="2"
          placeholder="Observaciones..."
          [(ngModel)]="form.notes"
          [disabled]="saving"
        ></textarea>
      </label>

      @if (validationError) {
        <p class="dialog-error" role="alert">
          <svg lucideAlertCircle size="15"></svg>
          {{ validationError }}
        </p>
      }
      @if (error) {
        <p class="dialog-error" role="alert">
          <svg lucideAlertCircle size="15"></svg>
          {{ error }}
        </p>
      }
    </div>

    <div class="dialog-footer">
      <button
        class="btn btn-secondary"
        type="button"
        (click)="close.emit()"
        [disabled]="saving"
      >
        Cancelar
      </button>
      <button
        class="btn btn-primary"
        type="button"
        (click)="submit()"
        [disabled]="saving"
      >
        @if (saving) {
          <svg lucideLoaderCircle size="15" class="spin"></svg>
          Guardando...
        } @else {
          {{ form.mode === 'create' ? 'Añadir pago' : 'Guardar cambios' }}
        }
      </button>
    </div>
  </div>
}
